# ProteoBench paper-mine pilot config (laptop-friendly defaults)

cube_csv: ../data/cube_inventory_270_cells.csv

# Pilot scope: Data integrity (B01) + Identification (B02)
batches:
  - B01
  - B02

only_final_selection: true  # final_selection_target_v0 > 0

# Stage 1 — literature fetch
papers_per_query: 20
max_papers_raw_per_cell: 40
max_queries_per_cell: 4
sleep_between_requests_seconds: 0.4
request_timeout_seconds: 60
max_fulltext_chars: 20000

# Stage 2 — rank
top_k_for_claude: 5

# Stage 3 — Claude extraction
claude_model: claude-sonnet-4-5
claude_max_tokens: 4096
claude_temperature: 0.1
claude_repair_retries: 1

# Paths (relative to paper_mine/)
paths:
  queue_dir: queue
  papers_dir: out/papers
  ranked_dir: out/ranked
  candidates_dir: out/candidates
  dataset_dir: out/dataset
  costs_dir: out/costs
  observability_dir: out/observability
  data_dir: out/data

# Stage 5 — public accession fetch
data_fetch:
  pride_api_base: https://www.ebi.ac.uk/pride/ws/archive/v3
  request_timeout_seconds: 120
  max_manifest_pages: 100
  manifest_page_size: 100
  max_download_bytes: 524288000  # 500 MiB per selected file
